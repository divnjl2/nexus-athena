id: ATHENA_TASK
name: athena.task.execute_one
domain: meta_orchestration
trigger:
  type: manual
classification:
  change_type: code_task
  tier: T2                       # writes code for one task; external gate decides done
  risk: MEDIUM
  autonomy: human-in-loop
dispatcher: cluster              # lord pool (ClusterClient.complete) — Hermes's working, whitelisted LLM path
cluster_timeout_s: 600
inputs:
  title:
    description: "What to implement (exactly one Athena task)"
    env: CEX_HERMES_INPUT_title
    default: ""
  success_check:
    description: "Executable command; exit 0 = task done. THE authoritative external gate."
    env: CEX_HERMES_INPUT_success_check
    default: ""
  files:
    description: "Comma-separated files the task may touch"
    env: CEX_HERMES_INPUT_files
    default: ""
  phase:
    description: "Source Athena phase key (provenance)"
    env: CEX_HERMES_INPUT_phase
    default: ""
  model:
    description: "Lord-pool tier. tier:t2 = active 14B workhorse (:8036). NOT tier:t3 (35B disabled)."
    env: CEX_HERMES_MODEL
    default: "tier:t2"
brief: |
  Implement EXACTLY this task and nothing else:
  ${CEX_HERMES_INPUT_title}
  Files you may touch: ${CEX_HERMES_INPUT_files}
  Done means this command exits 0: ${CEX_HERMES_INPUT_success_check}
  Output a unified diff for the change. Do not expand scope; new findings -> note, do not implement.
outputs:
  artifact_pattern: apps/hermes/data/cluster_runs.jsonl
quality_gates:
  - athena_task_success_check    # EXTERNAL gate: run inputs.success_check; exit 0 = pass (authoritative)
acceptance:
  cluster_routed: true
  success_check_exit_zero: true  # lord-pool self-report does NOT count; the gate decides
escalation:
  on_failure: notify_operator
  on_critical: spawn_opus
metadata:
  rationale: |
    Per-task executor for Athena master-plans (each plan task binds workflow: ATHENA_TASK).
    Executor = cluster lord pool (operator choice 2026-06-09). claurst deprecated + its LLM
    path is WFP-blocked from non-whitelisted procs; cluster is Hermes's working path.
    model=tier:t2 -> active 14B workhorse (:8036). T3/35B (:8035) is disabled — do NOT route there.
    success_check is the authoritative external gate (lord-pool self-report never closes a task).
  added: 2026-06-09
